name: Keep Streamlit App Awake via Ping

on:
  schedule:
    # Chạy tự động sau mỗi 4 tiếng để đảm bảo duy trì kết nối liên tục
    - cron: '0 */4 * * *'
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping Request to Streamlit
        run: |
          curl -s https://consumptions-1.streamlit.app > /dev/null
          echo "Đã gửi tín hiệu đánh thức ứng dụng lúc: $(date)"
