name: Keep App Awake

on:
  schedule:
    # Chạy mỗi 15 phút một lần từ thứ 2 đến chủ nhật để giữ app luôn thức
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send ping request to app
        run: |
          curl -I "https://streamlit.app"
